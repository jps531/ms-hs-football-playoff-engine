events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    upstream prefect {
        server prefect-server:4200;
    }

    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------------------
        # Security headers (HSTS added separately after TLS is configured)
        # ---------------------------------------------------------------------------
        add_header X-Content-Type-Options  "nosniff"                            always;
        add_header X-Frame-Options         "DENY"                               always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;

        # Limit request body size — Cloudinary rejects larger files anyway,
        # but this stops them from reaching application memory.
        client_max_body_size 12m;

        # ---------------------------------------------------------------------------
        # API — FastAPI handles its own JWT auth per-endpoint
        # ---------------------------------------------------------------------------
        location / {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Authorization     $http_authorization;
        }

        # ---------------------------------------------------------------------------
        # Prefect API calls from the browser.
        # Vue app calls /prefect/api/... (because PREFECT_UI_SERVE_BASE=/prefect
        # rewrites the placeholder); nginx strips /prefect/ to reach Prefect's /api/.
        # More specific than /prefect/ so nginx matches this block first.
        # ---------------------------------------------------------------------------
        location /prefect/api/ {
            auth_request       /internal/auth/verify-moderator;
            error_page 401 403 = @auth_error;

            proxy_pass         http://prefect/api/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ---------------------------------------------------------------------------
        # Prefect UI — requires a valid moderator Bearer token.
        #
        # With PREFECT_UI_SERVE_BASE=/prefect, Prefect mounts static files at
        # /prefect/ internally.  We must NOT strip the /prefect/ prefix here so
        # that Prefect receives the full path and serves the correct files.
        # ---------------------------------------------------------------------------
        location /prefect/ {
            auth_request       /internal/auth/verify-moderator;
            error_page 401 403 = @auth_error;

            proxy_pass         http://prefect/prefect/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ---------------------------------------------------------------------------
        # Internal auth subrequest — only reachable by nginx (auth_request)
        # ---------------------------------------------------------------------------
        location = /internal/auth/verify-moderator {
            internal;
            proxy_pass              http://api/api/v1/auth/verify-moderator;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length  "";
            proxy_set_header        X-Original-URI  $request_uri;
            proxy_set_header        Authorization   $http_authorization;
        }

        # ---------------------------------------------------------------------------
        # Auth error handler for Prefect UI access denials
        # ---------------------------------------------------------------------------
        location @auth_error {
            default_type application/json;
            return 401 '{"detail":"Moderator authentication required"}';
        }
    }
}
