events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    upstream prefect {
        server prefect-server:4200;
    }

    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------------------
        # API — FastAPI handles its own JWT auth per-endpoint
        # ---------------------------------------------------------------------------
        location / {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Forward Authorization header so FastAPI receives the Bearer token
            proxy_set_header   Authorization     $http_authorization;
        }

        # ---------------------------------------------------------------------------
        # Prefect UI — requires a valid moderator Bearer token
        # nginx performs an internal subrequest to FastAPI to validate before proxying
        # ---------------------------------------------------------------------------
        location /prefect/ {
            auth_request       /internal/auth/verify-moderator;
            error_page 401 403 = @auth_error;

            proxy_pass         http://prefect/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ---------------------------------------------------------------------------
        # Internal auth subrequest — only reachable by nginx (auth_request)
        # Forwards the Authorization header to FastAPI; returns 200/401/403
        # ---------------------------------------------------------------------------
        location = /internal/auth/verify-moderator {
            internal;
            proxy_pass              http://api/api/v1/auth/verify-moderator;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length  "";
            proxy_set_header        X-Original-URI  $request_uri;
            proxy_set_header        Authorization   $http_authorization;
        }

        # ---------------------------------------------------------------------------
        # Auth error handler for Prefect UI access denials
        # ---------------------------------------------------------------------------
        location @auth_error {
            default_type application/json;
            return 401 '{"detail":"Moderator authentication required"}';
        }
    }
}
